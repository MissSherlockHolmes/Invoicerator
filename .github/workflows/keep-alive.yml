# Pings the Supabase REST API on a schedule so the free-tier project stays active.
# Add repo secrets:
# - SUPABASE_URL (e.g. https://xxxx.supabase.co)
# - SUPABASE_SERVICE_ROLE_KEY
name: Keep Supabase Awake

on:
  schedule:
    - cron: '0 0 * * 1,4' # Monday and Thursday at 00:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (REST)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY repository secrets."
            exit 1
          fi
          BASE="${SUPABASE_URL%/}"

          echo "Pinging Supabase via PostgREST..."
          HTTP_CODE="$(curl -sS -o /dev/null -w "%{http_code}" \
            -X GET "${BASE}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")"

          echo "HTTP ${HTTP_CODE}"
          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "Supabase keep-alive ping failed."
            exit 1
          fi
