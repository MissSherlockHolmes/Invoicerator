# Pings the Supabase REST API on a schedule so the free-tier project stays active.
# Add repo secrets:
# - SUPABASE_URL (e.g. https://xxxx.supabase.co)
# - SUPABASE_SERVICE_ROLE_KEY
name: Keep Supabase Awake

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours (00:00 and 12:00 UTC)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Touch Supabase heartbeat RPC
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY repository secrets."
            exit 1
          fi
          BASE="${SUPABASE_URL%/}"

          echo "Touching keep-alive heartbeat via RPC..."
          RPC_BODY="$(mktemp)"
          RPC_CODE="$(curl -sS --retry 3 --retry-delay 5 --retry-connrefused -o "${RPC_BODY}" -w "%{http_code}" \
            -X POST "${BASE}/rest/v1/rpc/keepalive_heartbeat_touch" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"p_source":"github-actions"}')"

          echo "RPC HTTP ${RPC_CODE}"
          echo "RPC response: $(tr -d '\n' < "${RPC_BODY}")"
          if [ "${RPC_CODE}" -lt 200 ] || [ "${RPC_CODE}" -ge 300 ]; then
            echo "Supabase heartbeat RPC failed."
            exit 1
          fi

          echo "Reading heartbeat row for verification..."
          VERIFY_BODY="$(mktemp)"
          VERIFY_CODE="$(curl -sS --retry 3 --retry-delay 5 --retry-connrefused -o "${VERIFY_BODY}" -w "%{http_code}" \
            -X GET "${BASE}/rest/v1/keepalive_heartbeat?select=last_seen_at,source,updated_at&id=eq.1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")"

          echo "VERIFY HTTP ${VERIFY_CODE}"
          echo "VERIFY response: $(tr -d '\n' < "${VERIFY_BODY}")"
          if [ "${VERIFY_CODE}" -lt 200 ] || [ "${VERIFY_CODE}" -ge 300 ]; then
            echo "Supabase heartbeat verification read failed."
            exit 1
          fi
