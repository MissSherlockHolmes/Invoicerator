<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - Invoicerator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
    <div id="navbar-container"></div>
    
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 mx-auto">
                <h2 class="text-center mb-4">Reset Password</h2>
                <p class="text-center text-muted mb-4">Enter your email address and we will send you a link to reset your password.</p>
                
                <div id="error-message" class="alert alert-danger d-none" role="alert"></div>
                <div id="success-message" class="alert alert-success d-none" role="alert"></div>
                
                <form id="forgot-password-form">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email:</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary" id="reset-btn">Send Reset Link</button>
                    </div>
                </form>
                <p class="mt-4 text-center"><a href="/login.html" class="text-decoration-none">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase, isSupabaseReady } from '/js/supabase.js';
        import { renderNavbar } from '/js/navbar.js';
        import { serviceUnavailableMarkupDetailed } from '/js/supabase-connection.js';

        const formCol = document.querySelector('.container .col-md-6');

        (async () => {
            try {
                if (!isSupabaseReady()) {
                    if (formCol) formCol.innerHTML = serviceUnavailableMarkupDetailed();
                    return;
                }
                const nav = await renderNavbar();
                if (!nav.ok) {
                    if (formCol) formCol.innerHTML = serviceUnavailableMarkupDetailed();
                    return;
                }
            } catch (err) {
                console.error(err);
                if (formCol) formCol.innerHTML = serviceUnavailableMarkupDetailed();
                return;
            }

            document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const errorDiv = document.getElementById('error-message');
                const successDiv = document.getElementById('success-message');
                const btn = document.getElementById('reset-btn');
                
                btn.disabled = true;
                btn.textContent = 'Sending...';
                errorDiv.classList.add('d-none');
                successDiv.classList.add('d-none');

                let error = null;
                try {
                    const out = await supabase.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/update_password.html',
                    });
                    error = out.error;
                } catch (err) {
                    console.error(err);
                    errorDiv.textContent = 'Internal connection error, please contact the site administrator or check back in an hour.';
                    errorDiv.classList.remove('d-none');
                    btn.disabled = false;
                    btn.textContent = 'Send Reset Link';
                    return;
                }

                if (error) {
                    errorDiv.textContent = error.message;
                    errorDiv.classList.remove('d-none');
                    btn.disabled = false;
                    btn.textContent = 'Send Reset Link';
                } else {
                    successDiv.textContent = 'Password reset link sent! Please check your email.';
                    successDiv.classList.remove('d-none');
                    document.getElementById('forgot-password-form').reset();
                    btn.textContent = 'Link Sent';
                }
            });
        })();
    </script>
</body>
</html>
