<!DOCTYPE html>
<html>
<head>
    <title>Welcome to Invoicerator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Include Bootstrap CSS -->
    <link
        rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
        crossorigin="anonymous"
    />
    <!-- Link to external styles.css -->
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
    <div id="navbar-container"></div>
    <div class="d-flex justify-content-center align-items-center min-vh-100">
        <div class="text-center" id="content-area">
            <!-- Content injected via JS based on auth state -->
            <h2>Welcome to Invoicerator</h2>
            <p>Loading...</p>
        </div>
    </div>

    <script type="module">
        import { supabase } from '/js/supabase.js';
        import { renderNavbar } from '/js/navbar.js';

        async function init() {
            await renderNavbar();
            const { data: { session } } = await supabase.auth.getSession();
            const contentArea = document.getElementById('content-area');

            if (session) {
                // If they are already logged in and visit the homepage, redirect them straight to the dashboard
                window.location.href = '/options.html';
            } else {
                contentArea.innerHTML = `
                    <h2>Welcome to Invoicerator</h2>
                    <p>Create and send invoices quickly and securely.</p>
                    <a href="/login.html" class="btn btn-primary btn-block mb-3">Login</a>
                    <a href="/signup.html" class="btn btn-success btn-block mb-3">Sign Up</a>
                `;
            }
        }

        init();
    </script>
</body>
</html>
