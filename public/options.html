<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options - Invoicerator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        @media (max-width: 768px) {
            .btn {
                padding: 0.75rem 1rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="text-center w-100" style="max-width: 500px;">
            <h2 id="welcome-message" class="mb-2">Welcome!</h2>
            <p style="font-size: 16px; color: lightgray;" class="mb-5">Invoicing made better, quicker, and maybe almost fun.</p>
            
            <div class="d-grid gap-3">
                <a href="/create_invoice.html" class="btn btn-success btn-lg">Create Invoice</a>
                <a href="/edit_invoice.html" class="btn btn-warning btn-lg">Edit Invoice</a>
                <a href="/profile.html" class="btn btn-primary btn-lg">Profile & Team Settings</a>
                <button id="logout-btn-options" class="btn btn-danger btn-lg">Logout</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script type="module">
        import { supabase } from '/js/supabase.js';
        import { renderNavbar } from '/js/navbar.js';

        async function init() {
            await renderNavbar();
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = '/login.html';
                return;
            }
            
            // Fetch company name for the welcome message
            const { data: teamMember } = await supabase
                .from('team_members')
                .select('team_id, teams(company_name)')
                .eq('user_id', session.user.id)
                .maybeSingle();
            
            const profile = teamMember ? teamMember.teams : null;
            
            if (profile && profile.company_name) {
                document.getElementById('welcome-message').textContent = `Welcome back, ${profile.company_name}!`;
            } else {
                document.getElementById('welcome-message').textContent = `Welcome back!`;
            }

            document.getElementById('logout-btn-options').addEventListener('click', async () => {
                await supabase.auth.signOut();
                window.location.href = '/';
            });
        }
        init();
    </script>
</body>
</html>
