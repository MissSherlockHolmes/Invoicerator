<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Invoicerator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
    <div id="navbar-container"></div>
    
    <div class="page-wrapper">
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <h2 class="text-center mb-4">Create an Account</h2>

                    <div id="error-message" class="alert alert-danger d-none" role="alert"></div>

                    <form id="signup-form">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email:</label>
                            <input type="email" id="email" name="email" class="form-control" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" title="Please enter a valid email address (e.g. user@example.com)" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password:</label>
                            <div class="input-group">
                                <input type="password" id="password" name="password" class="form-control" style="border-top-right-radius: 0 !important; border-bottom-right-radius: 0 !important;" required>
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword" style="border-top-left-radius: 0 !important; border-bottom-left-radius: 0 !important;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16" id="eyeIcon">
                                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
                                    </svg>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-slash d-none" viewBox="0 0 16 16" id="eyeSlashIcon">
                                        <path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755-.165.165-.337.328-.517.486l.708.709z"/>
                                        <path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829l.822.822zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829z"/>
                                        <path d="M3.35 5.47c-.18.16-.353.322-.518.487A13.134 13.134 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7.029 7.029 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12-.708.708z"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="form-text mt-2" id="passwordHelp" style="font-size: 0.85em;">
                                Password must contain at least:
                                <ul class="mb-0 ps-3">
                                    <li id="req-length" class="text-danger">8 characters</li>
                                    <li id="req-letter" class="text-danger">1 letter</li>
                                    <li id="req-number" class="text-danger">1 number</li>
                                    <li id="req-special" class="text-danger">1 special character (!@#$%^&*)</li>
                                </ul>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">Confirm Password:</label>
                            <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
                            <div id="passwordMatchError" class="text-danger mt-1 d-none" style="font-size: 0.85em;">Passwords do not match</div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary" id="signup-btn">Sign Up</button>
                        </div>
                    </form>

                    <p class="mt-3 text-center">Already have an account? <a href="/login.html" class="text-decoration-none">Login here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase, isSupabaseReady } from '/js/supabase.js';
        import { serviceUnavailableMarkupDetailed } from '/js/supabase-connection.js';

        const signupCol = document.querySelector('.container .col-md-6');
        if (!isSupabaseReady()) {
            if (signupCol) signupCol.innerHTML = serviceUnavailableMarkupDetailed();
        } else {

        // Check if an email was passed in the URL (e.g. from an invite link)
        const urlParams = new URLSearchParams(window.location.search);
        const prefillEmail = urlParams.get('email');
        if (prefillEmail) {
            // Wait for the DOM to be fully loaded before setting the value
            document.addEventListener('DOMContentLoaded', () => {
                const emailInput = document.getElementById('email');
                if (emailInput) {
                    emailInput.value = prefillEmail;
                    // Make it readonly so they don't accidentally sign up with a different email than invited
                    emailInput.readOnly = true;
                }
            });
            // Also try setting it immediately in case DOMContentLoaded already fired
            const emailInput = document.getElementById('email');
            if (emailInput) {
                emailInput.value = prefillEmail;
                emailInput.readOnly = true;
            }
        }

        function showSuccessDialog() {
            const dialog = document.createElement('div');
            dialog.className = 'success-dialog';
            dialog.innerHTML = `
                <div class="dialog-content">
                    <h2>SIGN UP SUCCESSFUL!</h2>
                    <p>Please check your email to confirm your account before logging in.</p>
                    <button id="close-success-btn" class="btn btn-outline-info mt-3">Go to Login</button>
                </div>
            `;
            document.body.appendChild(dialog);
    
            dialog.style.position = 'fixed';
            dialog.style.top = '0';
            dialog.style.left = '0';
            dialog.style.width = '100%';
            dialog.style.height = '100%';
            dialog.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
            dialog.style.display = 'flex';
            dialog.style.justifyContent = 'center';
            dialog.style.alignItems = 'center';
            dialog.style.color = '#00bfff';
            dialog.style.fontFamily = 'Arial, sans-serif';
            dialog.style.zIndex = '1000';
    
            const content = dialog.querySelector('.dialog-content');
            content.style.backgroundColor = '#333';
            content.style.padding = '40px 60px';
            content.style.borderRadius = '15px';
            content.style.textAlign = 'center';
            content.style.boxShadow = '0 8px 30px rgba(0, 191, 255, 0.5)';
            content.style.transform = 'scale(0.7)';
            content.style.transition = 'transform 0.5s ease-out';
    
            content.querySelector('h2').style.color = '#00bfff';
            content.querySelector('h2').style.marginBottom = '15px';
            content.querySelector('h2').style.fontSize = '2rem';
            content.querySelector('p').style.color = '#ddd';
            content.querySelector('p').style.fontSize = '1.1rem';
    
            setTimeout(() => {
                content.style.transform = 'scale(1)';
            }, 100);
    
            document.getElementById('close-success-btn').addEventListener('click', () => {
                window.location.href = '/login.html';
            });
        }

        document.getElementById('togglePassword').addEventListener('click', function (e) {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            const eyeSlashIcon = document.getElementById('eyeSlashIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.add('d-none');
                eyeSlashIcon.classList.remove('d-none');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('d-none');
                eyeSlashIcon.classList.add('d-none');
            }
        });

        document.getElementById('password').addEventListener('input', function() {
            const val = this.value;
            
            const reqLength = document.getElementById('req-length');
            if (val.length >= 8) { reqLength.classList.replace('text-danger', 'text-success'); } 
            else { reqLength.classList.replace('text-success', 'text-danger'); }

            const reqLetter = document.getElementById('req-letter');
            if (/[a-zA-Z]/.test(val)) { reqLetter.classList.replace('text-danger', 'text-success'); } 
            else { reqLetter.classList.replace('text-success', 'text-danger'); }

            const reqNumber = document.getElementById('req-number');
            if (/[0-9]/.test(val)) { reqNumber.classList.replace('text-danger', 'text-success'); } 
            else { reqNumber.classList.replace('text-success', 'text-danger'); }

            const reqSpecial = document.getElementById('req-special');
            if (/[!@#$%^&*(),.?":{}|<>]/.test(val)) { reqSpecial.classList.replace('text-danger', 'text-success'); } 
            else { reqSpecial.classList.replace('text-success', 'text-danger'); }
        });

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const errorDiv = document.getElementById('error-message');
            const matchError = document.getElementById('passwordMatchError');
            const btn = document.getElementById('signup-btn');
            
            errorDiv.classList.add('d-none');
            matchError.classList.add('d-none');

            // Validate match
            if (password !== confirmPassword) {
                matchError.classList.remove('d-none');
                return;
            }

            // Validate strength
            if (password.length < 8 || !/[a-zA-Z]/.test(password) || !/[0-9]/.test(password) || !/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                errorDiv.textContent = "Please ensure your password meets all requirements.";
                errorDiv.classList.remove('d-none');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing up...';

            let data;
            let error;
            try {
                const out = await supabase.auth.signUp({
                    email,
                    password
                });
                data = out.data;
                error = out.error;
            } catch (err) {
                console.error(err);
                errorDiv.textContent = 'Internal connection error, please contact the site administrator or check back in an hour.';
                errorDiv.classList.remove('d-none');
                btn.disabled = false;
                btn.textContent = 'Sign Up';
                return;
            }

            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('d-none');
                btn.disabled = false;
                btn.textContent = 'Sign Up';
            } else {
                // Check if email confirmation is required
                if (data.user && data.user.identities && data.user.identities.length === 0) {
                    errorDiv.textContent = "This email is already registered. Please log in.";
                    errorDiv.classList.remove('d-none');
                    btn.disabled = false;
                    btn.textContent = 'Sign Up';
                    return;
                }
                
                // If session is null, it means email confirmation is turned ON in Supabase
                if (!data.session) {
                    showSuccessDialog();
                } else {
                    // If they somehow get a session immediately, redirect them
                    const pendingInvite = sessionStorage.getItem('pending_invite_token');
                    if (pendingInvite) {
                        window.location.href = '/accept_invite.html?token=' + pendingInvite;
                    } else {
                        window.location.href = '/options.html';
                    }
                }
            }
        });
        }
    </script>
</body>
</html>
