<!DOCTYPE html>
<html>
<head>
    <title>Update Password - Invoicerator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
    <div id="navbar-container"></div>
    
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 mx-auto">
                <h2 class="text-center mb-4">Set New Password</h2>
                
                <div id="error-message" class="alert alert-danger d-none" role="alert"></div>
                <div id="success-message" class="alert alert-success d-none" role="alert"></div>
                
                <form id="update-password-form">
                    <div class="mb-3">
                        <label for="password" class="form-label">New Password:</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" name="password" style="border-top-right-radius: 0 !important; border-bottom-right-radius: 0 !important;" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword" style="border-top-left-radius: 0 !important; border-bottom-left-radius: 0 !important;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16" id="eyeIcon">
                                    <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                                    <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
                                </svg>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-slash d-none" viewBox="0 0 16 16" id="eyeSlashIcon">
                                    <path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755-.165.165-.337.328-.517.486l.708.709z"/>
                                    <path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829l.822.822zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829z"/>
                                    <path d="M3.35 5.47c-.18.16-.353.322-.518.487A13.134 13.134 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7.029 7.029 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12-.708.708z"/>
                                </svg>
                            </button>
                        </div>
                        <div id="password-strength" class="form-text mt-2" style="font-size: 0.85em; color: #ff6666;">
                            Must be at least 8 characters long, contain 1 letter, 1 number, and 1 special character.
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm New Password:</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                        <div id="password-match" class="form-text mt-2 d-none" style="font-size: 0.85em;"></div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary" id="update-btn" disabled>Update Password</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from '/js/supabase.js';
        import { renderNavbar } from '/js/navbar.js';

        renderNavbar();

        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm_password');
        const strengthText = document.getElementById('password-strength');
        const matchText = document.getElementById('password-match');
        const updateBtn = document.getElementById('update-btn');

        // Password visibility toggle
        document.getElementById('togglePassword').addEventListener('click', function (e) {
            const eyeIcon = document.getElementById('eyeIcon');
            const eyeSlashIcon = document.getElementById('eyeSlashIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.add('d-none');
                eyeSlashIcon.classList.remove('d-none');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('d-none');
                eyeSlashIcon.classList.add('d-none');
            }
        });

        // Validation logic
        function validatePassword() {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            const hasLength = password.length >= 8;
            const hasLetter = /[a-zA-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecial = /[^a-zA-Z0-9]/.test(password);
            
            const isStrong = hasLength && hasLetter && hasNumber && hasSpecial;

            if (password.length > 0) {
                if (isStrong) {
                    strengthText.style.color = '#80ff00';
                    strengthText.textContent = 'Password meets requirements.';
                } else {
                    strengthText.style.color = '#ff6666';
                    strengthText.textContent = 'Must be at least 8 characters long, contain 1 letter, 1 number, and 1 special character.';
                }
            } else {
                strengthText.style.color = '#ff6666';
                strengthText.textContent = 'Must be at least 8 characters long, contain 1 letter, 1 number, and 1 special character.';
            }

            let isMatch = false;
            if (confirmPassword.length > 0) {
                matchText.classList.remove('d-none');
                if (password === confirmPassword) {
                    matchText.style.color = '#80ff00';
                    matchText.textContent = 'Passwords match.';
                    isMatch = true;
                } else {
                    matchText.style.color = '#ff6666';
                    matchText.textContent = 'Passwords do not match.';
                }
            } else {
                matchText.classList.add('d-none');
            }

            updateBtn.disabled = !(isStrong && isMatch);
        }

        passwordInput.addEventListener('input', validatePassword);
        confirmPasswordInput.addEventListener('input', validatePassword);

        // Handle submission
        document.getElementById('update-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = passwordInput.value;
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            
            updateBtn.disabled = true;
            updateBtn.textContent = 'Updating...';
            errorDiv.classList.add('d-none');
            successDiv.classList.add('d-none');

            // Supabase handles the session automatically from the URL hash when arriving from the email link
            const { error } = await supabase.auth.updateUser({
                password: password
            });

            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('d-none');
                updateBtn.disabled = false;
                updateBtn.textContent = 'Update Password';
            } else {
                successDiv.textContent = 'Password updated successfully! Redirecting to options...';
                successDiv.classList.remove('d-none');
                document.getElementById('update-password-form').reset();
                
                setTimeout(() => {
                    window.location.href = '/options.html';
                }, 2000);
            }
        });
    </script>
</body>
</html>
